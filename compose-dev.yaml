services:

  api:
    build:
      context: .
      dockerfile: back-template/Dockerfile
      target: final
    image: back-template:dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=mydb_dev;Username=postgres;Password=postgres"
      Jwt__Key: "dev-secret-key-change-me-at-least-32-chars!!"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mydb_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    volumes:
      - seq_dev_data:/data

volumes:
  postgres_dev_data:
  seq_dev_data:
